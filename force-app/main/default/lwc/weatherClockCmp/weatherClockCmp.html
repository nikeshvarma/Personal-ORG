<template>
    <div class="slds-card">
        <div class="slds-card__body slds-card__body_inner slds-grid slds-wrap slds-gutters slds-grid_vertical-align-center slds-grid_align-space slds-var-p-around_small">
            <div class="slds-col">
                <div class="widget">
                    <div class="left-panel panel">
                        <div class="city">{cityName}</div>
                        <div class="temp">
                            <img src={weatherImg} alt="icon" width="50" />&nbsp;{temprature}<span style="font-size: 36px;">&#8451;</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="slds-col">
                <div>
                    <p class="date-container">{todayDate}</p>
                </div>
            </div>

            <div class="clock-container slds-col">
                <div class="clock-col">
                    <p class="clock-day clock-timer"></p>
                    <p class="clock-label">Day</p>
                </div>
                <div class="clock-col">
                    <p class="clock-hours clock-timer"></p>
                    <p class="clock-label">Hours</p>
                </div>
                <div class="clock-col">
                    <p class="clock-minutes clock-timer"></p>
                    <p class="clock-label">Minutes</p>
                </div>
                <div class="clock-col">
                    <p class="clock-seconds clock-timer"></p>
                    <p class="clock-label">Seconds</p>
                </div>
            </div>
        </div>
    </div>
</template>
